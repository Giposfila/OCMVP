services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: verifyai
      POSTGRES_PASSWORD: verifyai
      POSTGRES_DB: verifyai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifyai -d verifyai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://verifyai:verifyai@db:5432/verifyai_db
      - SECRET_KEY=dev-secret-key-change-in-production-min-32-chars
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: